<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>管理后台 · 访问统计</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --title-top: 30px; }
    body {
      min-height: 100vh;
      background: #000;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: var(--title-top) 20px;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.015) 0%, transparent 60%), #000;
    }
    .container { max-width: 920px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 24px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #555; text-decoration: none; font-size: 13px;
      margin-bottom: 10px; transition: color 0.2s;
    }
    .back-link:hover { color: #4ecdc4; }
    .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 3px; color: #ddd; }
    .header .sub { font-size: 13px; color: #555; margin-top: 4px; }

    /* ===== 登录页 ===== */
    #loginScreen {
      max-width: 360px; margin: 60px auto; text-align: center;
    }
    #loginScreen h2 { font-size: 20px; margin-bottom: 20px; color: #ccc; letter-spacing: 2px; }
    #loginScreen .input-group {
      margin-bottom: 14px; text-align: left;
    }
    #loginScreen .input-group label {
      display: block; font-size: 12px; color: #666; margin-bottom: 4px; letter-spacing: 1px;
    }
    #loginScreen .input-group input {
      width: 100%; padding: 10px 14px;
      background: #111; border: 1px solid #222; border-radius: 8px;
      color: #ccc; font-size: 14px; outline: none; font-family: inherit;
      transition: border-color 0.2s;
    }
    #loginScreen .input-group input:focus { border-color: #4ecdc4; }
    #loginBtn {
      width: 100%; padding: 12px; margin-top: 8px;
      background: #4ecdc4; color: #000; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    #loginBtn:hover { opacity: 0.85; }
    #loginError { color: #ff6b6b; font-size: 13px; margin-top: 10px; min-height: 20px; }

    /* ===== 仪表盘 ===== */
    #dashboard { display: none; }

    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #111; border: 1px solid #222; border-radius: 10px;
      padding: 18px 16px; text-align: center;
    }
    .stat-card .num {
      font-size: 28px; font-weight: 700; color: #4ecdc4;
    }
    .stat-card .label {
      font-size: 12px; color: #555; margin-top: 4px; letter-spacing: 1px;
    }

    .chart-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: #111; border: 1px solid #222; border-radius: 10px; padding: 16px;
    }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-card h3 {
      font-size: 14px; color: #888; letter-spacing: 1px; margin-bottom: 12px;
    }
    .chart-card canvas { max-height: 280px; }

    .ip-detail,
    .visit-log {
      background: #111; border: 1px solid #222; border-radius: 10px; padding: 16px;
      margin-bottom: 24px;
    }
    .ip-detail h3,
    .visit-log h3 { font-size: 14px; color: #888; letter-spacing: 1px; margin-bottom: 12px; }
    .ip-detail table,
    .visit-log table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .ip-detail th, .ip-detail td,
    .visit-log th, .visit-log td {
      padding: 8px 10px; text-align: left; border-bottom: 1px solid #1a1a1a;
    }
    .ip-detail th,
    .visit-log th { color: #666; font-weight: 400; font-size: 11px; letter-spacing: 1px; }
    .ip-detail td,
    .visit-log td { color: #bbb; }

    .visit-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .visit-header h3 { margin-bottom: 0; }
    .visit-filters {
      display: flex; align-items: center; gap: 8px;
    }
    .visit-filters select {
      padding: 6px 10px; background: #111; border: 1px solid #333; border-radius: 6px;
      color: #bbb; font-size: 13px; outline: none; font-family: inherit;
    }
    .visit-filters select:focus { border-color: #4ecdc4; }

    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-top: 12px; flex-wrap: wrap;
    }
    .pagination .page-info { font-size: 13px; color: #555; }
    .pagination .page-jump { display: flex; align-items: center; gap: 4px; }
    .pagination .page-jump input {
      width: 56px; padding: 4px 8px; text-align: center;
      background: #111; border: 1px solid #333; border-radius: 4px;
      color: #bbb; font-size: 13px; outline: none; font-family: inherit;
    }
    .pagination .page-jump input:focus { border-color: #4ecdc4; }

    .logout-bar {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px; border: 1px solid #333; border-radius: 6px;
      background: transparent; color: #666; font-size: 13px; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .btn:hover { border-color: #4ecdc4; color: #4ecdc4; }
    .btn.danger:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* ===== 修改密码弹窗 ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #151515; border: 1px solid #222; border-radius: 12px;
      padding: 24px; width: 380px; max-width: 90vw;
    }
    .modal h3 { font-size: 16px; color: #ddd; margin-bottom: 16px; letter-spacing: 1px; }
    .modal .input-group { margin-bottom: 12px; }
    .modal .input-group label {
      display: block; font-size: 12px; color: #666; margin-bottom: 4px;
    }
    .modal .input-group input {
      width: 100%; padding: 9px 12px;
      background: #111; border: 1px solid #222; border-radius: 6px;
      color: #ccc; font-size: 13px; outline: none; font-family: inherit;
      transition: border-color 0.2s;
    }
    .modal .input-group input:focus { border-color: #4ecdc4; }
    .modal .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
    }
    .modal .modal-actions button {
      padding: 8px 18px; border: none; border-radius: 6px;
      font-size: 13px; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    .modal .modal-actions .btn-primary {
      background: #4ecdc4; color: #000; font-weight: 600;
    }
    .modal .modal-actions .btn-cancel {
      background: #222; color: #888;
    }
    .modal .modal-actions button:hover { opacity: 0.85; }
    .modal .modal-msg { font-size: 12px; min-height: 20px; margin-top: 8px; }
    .modal .modal-msg.ok { color: #4ecdc4; }
    .modal .modal-msg.err { color: #ff6b6b; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
      .visit-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="/">← 回到首页</a>

    <!-- ===== 登录页 ===== -->
    <div id="loginScreen">
      <h2>🔐 管理后台</h2>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="pwdInput" placeholder="输入密码…" autocomplete="off"/>
      </div>
      <button id="loginBtn">登录</button>
      <div id="loginError"></div>
    </div>

    <!-- ===== 仪表盘 ===== -->
    <div id="dashboard">
      <div class="header">
        <h1>📊 访问统计</h1>
        <div class="sub" id="statsPeriod">最近 7 天</div>
      </div>

      <div class="logout-bar">
        <button class="btn" id="refreshBtn">🔄 刷新</button>
        <button class="btn" id="changePwdBtn">🔑 修改密码</button>
        <button class="btn danger" id="logoutBtn">🚪 退出</button>
      </div>

      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="num" id="statTotal">-</div><div class="label">总访问</div></div>
        <div class="stat-card"><div class="num" id="statRecent">-</div><div class="label">近 7 天</div></div>
        <div class="stat-card"><div class="num" id="statUnique">-</div><div class="label">独立 IP</div></div>
        <div class="stat-card"><div class="num" id="statAvg">-</div><div class="label">日均</div></div>
      </div>

      <div class="chart-grid">
        <div class="chart-card full"><h3>📈 各工具访问排行</h3><canvas id="toolChart"></canvas></div>
        <div class="chart-card"><h3>🕐 时段分布</h3><canvas id="hourlyChart"></canvas></div>
        <div class="chart-card"><h3>📅 近 7 天趋势</h3><canvas id="trendChart"></canvas></div>
      </div>

      <div class="ip-detail" id="ipDetail">
        <h3>🔍 IP 明细</h3>
        <table><thead><tr><th>工具</th><th>IP</th><th>访问次数</th><th>最近访问</th><th>UA</th></tr></thead><tbody id="ipBody"></tbody></table>
      </div>

      <div class="visit-log" id="visitLog">
        <div class="visit-header">
          <h3>📋 访问记录</h3>
          <div class="visit-filters">
            <select id="filterTool"><option value="">全部工具</option></select>
            <button class="btn" id="visitSearchBtn">搜索</button>
          </div>
        </div>
        <table><thead><tr><th>ID</th><th>IP</th><th>工具</th><th>UA</th><th>访问时间</th></tr></thead><tbody id="visitBody"></tbody></table>
        <div class="pagination">
          <button class="btn" id="prevPageBtn">← 上一页</button>
          <span class="page-info" id="pageInfo"></span>
          <div class="page-jump">
            <input type="number" id="pageInput" min="1" value="1"/>
            <button class="btn" id="goPageBtn">跳转</button>
          </div>
          <button class="btn" id="nextPageBtn">下一页 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 修改密码弹窗 ===== -->
  <div class="modal-overlay" id="pwdModal">
    <div class="modal">
      <h3>🔑 修改密码</h3>
      <div class="input-group">
        <label>当前密码</label>
        <input type="password" id="oldPwd" autocomplete="off"/>
      </div>
      <div class="input-group">
        <label>新密码</label>
        <input type="password" id="newPwd" autocomplete="off"/>
      </div>
      <div class="input-group">
        <label>确认新密码</label>
        <input type="password" id="confirmPwd" autocomplete="off"/>
      </div>
      <div class="modal-msg" id="pwdMsg"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="pwdCancel">取消</button>
        <button class="btn-primary" id="pwdSave">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ===== API =====
    const creds = { credentials: 'same-origin' };

    async function apiPost(path, body) {
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: 'same-origin',
        body: JSON.stringify(body)
      });
      return res.json();
    }

    async function apiGet(path) {
      const res = await fetch(path, { credentials: 'same-origin' });
      return res.json();
    }

    // ===== DOM =====
    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');
    const pwdInput = document.getElementById('pwdInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');

    // Tab 模式下隐藏返回链接
    try { if (window.top !== window.self) document.querySelector('.back-link').style.display = 'none'; } catch(e) {}

    // ===== 登录 =====
    async function doLogin() {
      const pwd = pwdInput.value;
      const data = await apiPost("/api/login", { password: pwd });
      if (data.ok) {
        showDashboard();
      } else {
        loginError.textContent = "❌ " + (data.error || "登录失败");
        pwdInput.value = "";
        pwdInput.focus();
      }
    }

    loginBtn.addEventListener('click', doLogin);
    pwdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

    logoutBtn.addEventListener('click', async () => {
      await apiPost("/api/logout");
      loginScreen.style.display = 'block';
      dashboard.style.display = 'none';
      pwdInput.value = '';
      loginError.textContent = '';
    });

    // ===== 仪表盘 =====
    let toolChart, hourlyChart, trendChart;

    function showDashboard() {
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      document.querySelector('.back-link').style.display = 'none';
      loadStats();
      loadVisits();
    }

    function num(n) { return n.toLocaleString(); }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats?ip_detail=1', creds);
        const data = await res.json();
        renderStats(data);
      } catch(e) {
        console.error('Failed to load stats', e);
      }
    }

    function renderStats(data) {
      const toolList = Object.entries(data.per_tool || {}).map(([t, c]) => ({ tool: t, cnt: c })).sort((a,b) => b.cnt - a.cnt);

      document.getElementById('statTotal').textContent = num(data.total);
      document.getElementById('statRecent').textContent = num(data.total);
      document.getElementById('statUnique').textContent = num(data.unique_ips);
      document.getElementById('statAvg').textContent = num(Math.round(data.total / 7));

      renderToolChart(toolList);
      renderHourlyChart(data.hourly_distribution || {});
      renderTrendChart(toolList);
      renderIpDetail(data.ip_details || []);
    }

    function renderToolChart(toolStats) {
      const labels = toolStats.map(t => t.tool);
      const values = toolStats.map(t => t.cnt);
      const colors = ['#4ecdc4','#ffd93d','#ff6b6b','#6c5ce7','#00cec9','#fdcb6e','#e17055','#00b894'];

      if (toolChart) toolChart.destroy();

      const ctx = document.getElementById('toolChart').getContext('2d');
      toolChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors.slice(0, labels.length),
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { color: '#1a1a1a' },
              ticks: { color: '#666' }
            },
            y: {
              grid: { display: false },
              ticks: { color: '#888' }
            }
          }
        }
      });
    }

    function renderHourlyChart(hourly) {
      const labels = Array.from({length: 24}, (_, i) => String(i).padStart(2,'0') + ':00');
      const values = labels.map(h => hourly[h.replace(':00','')] || 0);

      if (hourlyChart) hourlyChart.destroy();

      const ctx = document.getElementById('hourlyChart').getContext('2d');
      hourlyChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: '#4ecdc4',
            backgroundColor: 'rgba(78, 205, 196, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 2,
            pointBackgroundColor: '#4ecdc4',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { color: '#1a1a1a' },
              ticks: { color: '#666', maxTicksLimit: 8 }
            },
            y: {
              grid: { color: '#1a1a1a' },
              ticks: { color: '#666', stepSize: 1 }
            }
          }
        }
      });
    }

    function renderTrendChart() {
      // 显示各工具近 7 天趋势 — 使用 mock 日分布
      if (trendChart) trendChart.destroy();
      const labels = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        labels.push((d.getMonth()+1) + '/' + d.getDate());
      }

      const ctx = document.getElementById('trendChart').getContext('2d');
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '访问量',
            data: [0, 0, 0, 0, 0, 0, 0],
            borderColor: '#ffd93d',
            backgroundColor: 'rgba(255, 217, 61, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: '#ffd93d',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1a1a1a' }, ticks: { color: '#666' } },
            y: { grid: { color: '#1a1a1a' }, ticks: { color: '#666', stepSize: 1 } }
          }
        }
      });
    }

    function renderIpDetail(ipDetails) {
      const tbody = document.getElementById('ipBody');
      if (!ipDetails || ipDetails.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#444;padding:30px;">暂无数据</td></tr>';
        return;
      }
      let html = '';
      ipDetails.forEach(detail => {
        Object.entries(detail.tool_count || {}).forEach(([tool, cnt]) => {
          const ua = detail.user_agent ? detail.user_agent.substring(0, 50) + (detail.user_agent.length > 50 ? '...' : '') : '-';
          html += `<tr><td>${tool}</td><td>${detail.ip}</td><td>${cnt}</td><td>-</td><td style="font-size:11px;color:#666;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${ua}">${ua}</td></tr>`;
        });
      });
      tbody.innerHTML = html;
    }

    // ===== 访问记录分页 =====
    let visitPage = 1;
    let visitTotal = 0;
    let visitPageSize = 20;
    let visitFilterTool = "";

    const filterTool = document.getElementById('filterTool');
    const visitBody = document.getElementById('visitBody');
    const pageInfo = document.getElementById('pageInfo');
    const pageInput = document.getElementById('pageInput');

    async function loadVisits() {
      try {
        const res = await fetch(`/api/visits?page=${visitPage}&page_size=${visitPageSize}&tool=${encodeURIComponent(visitFilterTool)}`, creds);
        const data = await res.json();
        if (!data.ok) return;
        renderVisits(data);
      } catch(e) {
        console.error('Failed to load visits', e);
      }
    }

    function renderVisits(data) {
      visitTotal = data.total;
      const visits = data.data || [];

      // Populate tool filter dropdown (only once)
      if (data.tools && data.tools.length > 0 && filterTool.options.length <= 1) {
        data.tools.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t;
          opt.textContent = t;
          filterTool.appendChild(opt);
        });
      }

      // Render table
      if (visits.length === 0) {
        visitBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#444;padding:30px;">暂无数据</td></tr>';
      } else {
        let html = '';
        visits.forEach(v => {
          const t = new Date(v.visited_at);
          const time = t.toLocaleString('zh-CN', { hour12: false });
          const ua = v.user_agent ? v.user_agent.substring(0, 60) + (v.user_agent.length > 60 ? '...' : '') : '-';
          html += `<tr><td>${v.id}</td><td>${v.ip}</td><td>${v.tool}</td><td style="font-size:11px;color:#666;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(v.user_agent || '').replace(/"/g, '&quot;')}">${ua}</td><td>${time}</td></tr>`;
        });
        visitBody.innerHTML = html;
      }

      // Pagination info
      const totalPages = Math.max(1, Math.ceil(visitTotal / visitPageSize));
      pageInfo.textContent = `第 ${visitPage} / ${totalPages} 页（共 ${num(visitTotal)} 条）`;
      pageInput.value = visitPage;
      pageInput.max = totalPages;
    }

    // Pagination event listeners
    document.getElementById('prevPageBtn').addEventListener('click', () => {
      if (visitPage > 1) { visitPage--; loadVisits(); }
    });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
      const totalPages = Math.max(1, Math.ceil(visitTotal / visitPageSize));
      if (visitPage < totalPages) { visitPage++; loadVisits(); }
    });
    document.getElementById('goPageBtn').addEventListener('click', () => {
      const totalPages = Math.max(1, Math.ceil(visitTotal / visitPageSize));
      const p = parseInt(pageInput.value);
      if (p >= 1 && p <= totalPages) {
        visitPage = p;
        loadVisits();
      }
    });
    pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('goPageBtn').click();
    });
    document.getElementById('visitSearchBtn').addEventListener('click', () => {
      visitFilterTool = filterTool.value;
      visitPage = 1;
      loadVisits();
    });
    filterTool.addEventListener('change', () => {
      visitFilterTool = filterTool.value;
      visitPage = 1;
      loadVisits();
    });

    // ===== 修改密码 =====
    const pwdModal = document.getElementById("pwdModal");
    const oldPwd = document.getElementById("oldPwd");
    const newPwd = document.getElementById("newPwd");
    const confirmPwd = document.getElementById("confirmPwd");
    const pwdMsg = document.getElementById("pwdMsg");

    const el_refreshBtn=document.getElementById("refreshBtn");if(el_refreshBtn)el_refreshBtn.addEventListener("click", () => {
      loadStats();
    });

    const el_changePwdBtn=document.getElementById("changePwdBtn");if(el_changePwdBtn)el_changePwdBtn.addEventListener("click", () => {
      oldPwd.value = ""; newPwd.value = ""; confirmPwd.value = "";
      pwdMsg.textContent = "";
      pwdModal.classList.add("open");
      oldPwd.focus();
    });

    const el_pwdCancel=document.getElementById("pwdCancel");if(el_pwdCancel)el_pwdCancel.addEventListener("click", () => {
      pwdModal.classList.remove("open");
    });
    pwdModal.addEventListener("click", (e) => {
      if (e.target === pwdModal) pwdModal.classList.remove("open");
    });

    const el_pwdSave=document.getElementById("pwdSave");if(el_pwdSave)el_pwdSave.addEventListener("click", async () => {
      const old = oldPwd.value;
      const nu = newPwd.value;
      const confirm = confirmPwd.value;

      if (!nu || nu.length < 4) {
        pwdMsg.textContent = "❌ 新密码至少 4 位";
        pwdMsg.className = "modal-msg err";
        return;
      }
      if (nu !== confirm) {
        pwdMsg.textContent = "❌ 两次密码不一致";
        pwdMsg.className = "modal-msg err";
        return;
      }

      const data = await apiPost("/api/change-password", {
        old_password: old,
        new_password: nu
      });
      if (data.ok) {
        pwdMsg.textContent = "✅ 密码修改成功！";
        pwdMsg.className = "modal-msg ok";
        setTimeout(() => pwdModal.classList.remove("open"), 1500);
      } else {
        pwdMsg.textContent = "❌ " + (data.error || "修改失败");
        pwdMsg.className = "modal-msg err";
      }
    });

    confirmPwd.addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("pwdSave").click();
    });

    // ===== 初始化：校验 session =====
    (async function() {
      try {
        const data = await apiGet("/api/check-session");
        if (data.ok) {
          showDashboard();
          return;
        }
      } catch(e) {}
      // session 无效，显示登录页（默认 state）
    })();
  </script>
</body>
</html>
