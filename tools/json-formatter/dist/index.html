<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JSON 格式化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --title-top: 30px; --container-width: 860px; }
    body {
      min-height: 100vh; height: 100vh; overflow: hidden;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: var(--title-top) 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }
    textarea, .output, #escapeOutput {
      user-select: text;
      -webkit-user-select: text;
    }
    .container {
      max-width: var(--container-width); width: 100%;
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }

    .header { text-align: center; margin-bottom: 8px; flex-shrink: 0; }
    .header h1 { font-size: 24px; font-weight: 700; color: #ffd93d; margin-bottom: 2px; }
    .header .sub { font-size: 13px; color: #555; letter-spacing: 1px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #555; text-decoration: none; font-size: 13px; margin-bottom: 8px;
      transition: color 0.2s; flex-shrink: 0;
    }
    .back-link:hover { color: #ffd93d; }

    /* ===== Tab Bar ===== */
    .tab-bar {
      display: flex; gap: 0; margin-bottom: 8px;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 10px 24px; font-size: 14px; color: #555; cursor: pointer;
      background: transparent; border: none; font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: #888; }
    .tab-btn.active { color: #ffd93d; border-bottom-color: #ffd93d; }

    .tab-content { display: none; }
    .tab-content.active {
      display: flex; flex-direction: column;
      flex: 1; min-height: 0;
    }

    /* ===== Toolbar ===== */
    .toolbar {
      display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;
      align-items: center; flex-shrink: 0;
    }
    .toolbar .title { font-size: 12px; color: #666; letter-spacing: 1px; margin-right: auto; text-transform: uppercase; }
    .btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 7px 16px; border: 1px solid #333; border-radius: 6px;
      background: #1a1a1a; color: #ccc; font-size: 13px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .btn:hover { border-color: #ffd93d; color: #ffd93d; background: #1a1a10; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #2a2820; border-color: #ffd93d; color: #ffd93d; }
    .btn-primary:hover { background: #3a3820; }
    .btn-danger { color: #ff6b6b; }
    .btn-danger:hover { border-color: #ff6b6b; color: #ff6b6b; background: #1a1010; }
    .btn-success { color: #4ecdc4; }
    .btn-success:hover { border-color: #4ecdc4; color: #4ecdc4; background: #101a18; }

    /* ===== Toggle & Depth ===== */
    .toggle-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: #888; cursor: pointer;
      padding: 5px 10px; border: 1px solid #222; border-radius: 6px;
      background: #0f0f0f; user-select: none;
    }
    .toggle-label input[type="checkbox"] { accent-color: #4ecdc4; }
    .toggle-label:hover { border-color: #333; color: #aaa; }

    .depth-control {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; color: #888;
      padding: 5px 10px; border: 1px solid #222; border-radius: 6px;
      background: #0f0f0f;
    }
    .depth-btn {
      width: 26px; height: 26px; padding: 0;
      background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
      color: #aaa; font-size: 16px; line-height: 1;
      cursor: pointer; transition: all 0.12s;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .depth-btn:hover { border-color: #4ecdc4; color: #4ecdc4; background: #1a2a28; }
    .depth-btn:active { transform: scale(0.92); }
    .depth-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .depth-val { width: 24px; text-align: center; color: #ddd; font-size: 14px; }

    /* ===== Editor Panes ===== */
    .editor-pane {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      flex: 1; min-height: 0;
    }

    .pane {
      background: #111; border: 1px solid #222; border-radius: 10px;
      display: flex; flex-direction: column;
      overflow: hidden; min-height: 0;
    }
    .pane-header {
      display: flex; align-items: center; gap: 8px; justify-content: space-between;
      padding: 8px 14px; border-bottom: 1px solid #1a1a1a;
      font-size: 12px; color: #555; letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .pane-header .left { display: flex; align-items: center; gap: 8px; }
    .pane-header .right { display: flex; align-items: center; gap: 4px; }
    .pane-header .badge {
      font-size: 10px; padding: 1px 7px; border-radius: 3px;
      background: #1a1a1a; color: #666;
    }
    .pane-header .badge.ok { background: #1a2a28; color: #4ecdc4; }
    .pane-header .badge.err { background: #2a1818; color: #ff6b6b; }
    .pane-header .act {
      padding: 2px 6px; color: #555; font-size: 12px; cursor: pointer;
      transition: color 0.12s; user-select: none;
    }
    .pane-header .act:hover { color: #4ecdc4; }
    .pane-header .act.clear:hover { color: #ff6b6b; }

    textarea, .output {
      width: 100%; flex: 1; min-height: 0;
      background: #0d0d0d; border: none; outline: none;
      color: #d4d4d4; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      font-size: 13px; line-height: 1.6; padding: 14px;
      resize: vertical; tab-size: 2;
    }
    textarea::placeholder { color: #333; }
    textarea:focus { background: #0a0a0a; }
    .output-wrap {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    .output {
      white-space: pre-wrap; word-break: break-all;
      overflow-y: auto;
      user-select: text;
      -webkit-user-select: text;
    }
    .output.error { color: #ff6b6b; }
    .output.empty { color: #333; }
    .output .key { color: #9cdcfe; }
    .output .val-string { color: #ce9178; }
    .output .val-number { color: #b5cea8; }
    .output .val-bool { color: #569cd6; }
    .output .val-null { color: #569cd6; }
    .output .bracket { color: #dcdcaa; }
    .output .op { color: #888; }

    .status-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 14px; border-top: 1px solid #1a1a1a;
      font-size: 12px; color: #444;
      flex-shrink: 0;
    }
    .status-bar .stat { display: flex; align-items: center; gap: 4px; }
    .status-bar .stat .val { color: #888; }

    .footer { text-align: center; margin-top: 8px; font-size: 12px; color: #333; flex-shrink: 0; }

    @media (max-width: 700px) {
      .editor-pane { grid-template-columns: 1fr; }
      body { padding: 12px 12px 12px; }
    }

    /* Escape output shows single-line string */
    #escapeOutput .escaped-str { color: #ce9178; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回工具集</a>

    <div class="header">
      <h1>{ } JSON 工具</h1>
      <div class="sub">格式化 · 转义 · 反转义嵌套</div>
    </div>

    <!-- ========== Tab Buttons ========== -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="format">格式化</button>
      <button class="tab-btn" data-tab="escape">转义</button>
    </div>

    <!-- ================================================================ -->
    <!-- TAB: 格式化                                                        -->
    <!-- ================================================================ -->
    <div id="tab-format" class="tab-content active">
      <div class="toolbar">
        <span class="title">操作</span>
        <button class="btn btn-primary" onclick="format()">▸ 格式化</button>
        <label class="toggle-label">
          <input type="checkbox" id="unescapeCheck"> 反转义嵌套 JSON
        </label>
        <span class="depth-control">
          层数
          <button class="depth-btn" id="depthDec" onclick="depthChange(-1)" disabled>−</button>
          <span class="depth-val" id="depthVal">1</span>
          <button class="depth-btn" id="depthInc" onclick="depthChange(1)">+</button>
        </span>
        <button class="btn" onclick="copyResult()">📋 复制结果</button>
        <button class="btn btn-danger" onclick="clearAll()">✕ 清空</button>
      </div>

      <div class="editor-pane">
        <!-- 输入 -->
        <div class="pane">
          <div class="pane-header">
            <span class="left">输入 <span id="inputLabel" class="badge">等待输入</span></span>
            <span class="right">
              <span class="act clear" onclick="clearInput()">清空</span>
              <span class="act" onclick="copyInput()">复制</span>
            </span>
          </div>
          <textarea id="input" placeholder="在此粘贴或输入 JSON …" spellcheck="false"></textarea>
        </div>

        <!-- 输出 -->
        <div class="pane">
          <div class="pane-header">
            <span class="left">输出 <span id="outputLabel" class="badge">就绪</span></span>
            <span class="right">
              <span class="act clear" onclick="clearOutput()">清空</span>
              <span class="act" onclick="copyResult()">复制</span>
            </span>
          </div>
          <div class="output-wrap">
            <div id="output" class="output empty">等待输入…</div>
          </div>
          <div class="status-bar">
            <span class="stat">行 <span id="lineCount" class="val">0</span></span>
            <span class="stat">字符 <span id="charCount" class="val">0</span></span>
            <span class="stat" id="sizeInfo"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- TAB: 转义                                                        -->
    <!-- ================================================================ -->
    <div id="tab-escape" class="tab-content">
      <div class="toolbar">
        <span class="title">操作</span>
        <button class="btn btn-primary" onclick="doEscape()">▸ 转义为字符串</button>
        <button class="btn" onclick="copyEscapeResult()">📋 复制结果</button>
        <button class="btn btn-danger" onclick="clearEscape()">✕ 清空</button>
      </div>

      <div class="editor-pane">
        <!-- 输入 -->
        <div class="pane">
          <div class="pane-header">
            <span class="left">输入 JSON <span id="escapeInputLabel" class="badge">等待输入</span></span>
            <span class="right">
              <span class="act clear" onclick="clearEscapeInput()">清空</span>
              <span class="act" onclick="copyEscapeInput()">复制</span>
            </span>
          </div>
          <textarea id="escapeInput" placeholder="在此粘贴要转义的 JSON 对象或数组…" spellcheck="false"></textarea>
        </div>

        <!-- 输出 -->
        <div class="pane">
          <div class="pane-header">
            <span class="left">转义结果 <span id="escapeOutputLabel" class="badge">就绪</span></span>
            <span class="right">
              <span class="act clear" onclick="clearEscapeOutput()">清空</span>
              <span class="act" onclick="copyEscapeResult()">复制</span>
            </span>
          </div>
          <div class="output-wrap">
            <div id="escapeOutput" class="output empty">等待输入…</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">JSON 工具 · 纯浏览器端处理 · 不传输任何数据</div>
  </div>

  <script>
    // ================================================================
    // Tab switching
    // ================================================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ================================================================
    // DOM refs
    // ================================================================
    const $input = document.getElementById('input');
    const $output = document.getElementById('output');
    const $inputLabel = document.getElementById('inputLabel');
    const $outputLabel = document.getElementById('outputLabel');
    const $lineCount = document.getElementById('lineCount');
    const $charCount = document.getElementById('charCount');
    const $sizeInfo = document.getElementById('sizeInfo');
    const $unescapeCheck = document.getElementById('unescapeCheck');
    const $depthVal = document.getElementById('depthVal');
    let depthValue = 1;
    function depthChange(delta) {
      depthValue = Math.max(1, Math.min(20, depthValue + delta));
      $depthVal.textContent = depthValue;
      document.getElementById('depthDec').disabled = depthValue <= 1;
      document.getElementById('depthInc').disabled = depthValue >= 20;
    }

    const $escapeInput = document.getElementById('escapeInput');
    const $escapeOutput = document.getElementById('escapeOutput');
    const $escapeInputLabel = document.getElementById('escapeInputLabel');
    const $escapeOutputLabel = document.getElementById('escapeOutputLabel');

    // ================================================================
    // Token-based JSON formatter (preserves original values)
    // ================================================================
    function tokenize(raw) {
      const tokens = [];
      let i = 0;
      while (i < raw.length) {
        const ch = raw[i];
        if (ch === ' ' || ch === '\t' || ch === '\n' || ch === '\r') { i++; continue; }
        if (ch === '"') {
          let str = '"';
          i++;
          while (i < raw.length) {
            const c = raw[i];
            str += c;
            i++;
            if (c === '"') break;
            if (c === '\\' && i < raw.length) { str += raw[i]; i++; }
          }
          tokens.push({ type: 'string', value: str });
          continue;
        }
        if ('{}[]:,'.includes(ch)) {
          tokens.push({ type: ch === ':' || ch === ',' ? 'punct' : 'bracket', value: ch });
          i++;
          continue;
        }
        let val = '';
        while (i < raw.length && ![' ', '\t', '\n', '\r', ',', '}', ']', ':'].includes(raw[i])) {
          val += raw[i];
          i++;
        }
        tokens.push({ type: 'value', value: val });
      }
      return tokens;
    }

    function prettyPrint(tokens) {
      const lines = [];
      let indent = '';
      const INDENT = '  ';
      let currentLine = '';
      let expectValue = false;

      function flushLine() {
        if (currentLine !== '') {
          lines.push(indent + currentLine);
          currentLine = '';
        }
      }

      for (let idx = 0; idx < tokens.length; idx++) {
        const tok = tokens[idx];
        if (tok.type === 'punct') {
          if (tok.value === ':') { currentLine += ': '; expectValue = true; }
          else {
            // 如果 currentLine 为空（紧接在 }] 之后），追加到上一行末尾
            if (currentLine !== '') {
              currentLine += ',';
              flushLine();
            } else if (lines.length > 0) {
              lines[lines.length - 1] += ',';
            }
          }
          continue;
        }
        if (tok.type === 'bracket') {
          if (tok.value === '{' || tok.value === '[') {
            const next = idx + 1 < tokens.length ? tokens[idx + 1] : null;
            const isSingle = next && next.type === 'bracket' &&
              ((tok.value === '{' && next.value === '}') || (tok.value === '[' && next.value === ']'));
            if (isSingle) {
              if (expectValue) { currentLine += tok.value === '{' ? '{}' : '[]'; expectValue = false; }
              else { if (currentLine !== '') flushLine(); lines.push(indent + (tok.value === '{' ? '{}' : '[]')); }
              idx++;
            } else {
              if (expectValue) { currentLine += tok.value === '{' ? '{' : '['; flushLine(); expectValue = false; }
              else { if (currentLine !== '') flushLine(); lines.push(indent + (tok.value === '{' ? '{' : '[')); }
              indent += INDENT;
            }
          } else {
            // 先刷行（用当前缩进），再减缩进，最后推闭合括号
            if (currentLine !== '') flushLine();
            indent = indent.slice(0, -INDENT.length);
            lines.push(indent + tok.value);
          }
          continue;
        }
        if (expectValue) { currentLine += tok.value; expectValue = false; }
        else { if (currentLine !== '') flushLine(); currentLine = tok.value; }
      }
      if (currentLine !== '') flushLine();
      return lines.join('\n');
    }

    function formatJSON(raw) {
      return prettyPrint(tokenize(raw));
    }

    // ================================================================
    // Reverse-escape: recursively unescape JSON string fields
    // ================================================================
    // One level of JSON string unescaping (\\x -> actual char)
    function unescapeContent(str) {
      let result = '';
      for (let i = 0; i < str.length; i++) {
        if (str[i] === '\\' && i + 1 < str.length) {
          const next = str[i + 1];
          if (next === '"') result += '"';
          else if (next === '\\') result += '\\';
          else if (next === 'n') result += '\n';
          else if (next === 'r') result += '\r';
          else if (next === 't') result += '\t';
          else if (next === '/') result += '/';
          else if (next === 'u') {
            const hex = str.slice(i + 2, i + 6);
            if (/^[0-9a-fA-F]{4}$/.test(hex)) {
              result += String.fromCharCode(parseInt(hex, 16));
              i += 5;
              continue;
            }
          } else {
            result += '\\' + next;
          }
          i++;
        } else {
          result += str[i];
        }
      }
      return result;
    }

    // ================================================================
    // Text-level unescape (preserves large numbers)
    // ================================================================
    // Unescape string tokens recursively (text-level, no JSON.parse)
    function unescapeTokens(tokens, depth) {
      if (depth <= 0 || !tokens || tokens.length === 0) return tokens;

      const result = [];
      for (let i = 0; i < tokens.length; i++) {
        const tok = tokens[i];

        if (tok.type === 'string') {
          // Extract the string content (between quotes)
          let inner = tok.value;
          // Already includes quotes, check if inner value is JSON
          const content = inner.slice(1, -1); // remove surrounding quotes
          const trimmed = content.trim();

          if ((trimmed.startsWith('{') && trimmed.endsWith('}')) ||
              (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
            // Unescape one level first, then tokenize and recurse
            const unescapedInner = unescapeContent(trimmed);
            const innerTokens = tokenize(unescapedInner);
            const unescaped = unescapeTokens(innerTokens, depth - 1);
            // Spread inner tokens so prettyPrint handles indentation uniformly
            for (const t of unescaped) result.push(t);
          } else {
            result.push(tok);
          }
        } else {
          result.push(tok);
        }
      }
      return result;
    }

    // ================================================================
    // Syntax highlighting
    // ================================================================
    function highlightSyntax(json) {
      let h = json
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      h = h.replace(/("(?:[^"\\]|\\.)*")(\s*:)/g, '<span class="key">$1</span>$2');
      h = h.replace(/(: )("(?:[^"\\]|\\.)*")/g, '$1<span class="val-string">$2</span>');
      h = h.replace(/\b(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)\b/g, '<span class="val-number">$1</span>');
      h = h.replace(/\b(true|false)\b/g, '<span class="val-bool">$1</span>');
      h = h.replace(/\b(null)\b/g, '<span class="val-null">$1</span>');
      h = h.replace(/([{}[\]])/g, '<span class="bracket">$1</span>');
      return h;
    }

    function updateStats(text) {
      const lines = text ? text.split('\n').length : 0;
      const chars = text ? text.length : 0;
      $lineCount.textContent = lines;
      $charCount.textContent = chars.toLocaleString();
      if (chars > 0) {
        $sizeInfo.innerHTML = '· 大小 <span class="val">' + (chars / 1024).toFixed(1) + ' KB</span>';
      } else {
        $sizeInfo.innerHTML = '';
      }
    }

    // ================================================================
    // JSON stringify with formatting (for unescape output)
    // ================================================================
    // ================================================================
    // Format action
    // ================================================================
    function format() {
      const raw = $input.value;
      if (!raw.trim()) {
        $output.textContent = '请先输入 JSON';
        $output.className = 'output error';
        return;
      }

      // First, try to parse for semantic operations (unescape)
      let parsed;
      let parseOk = true;
      try { parsed = JSON.parse(raw); } catch (e) { parseOk = false; }

      let resultStr;
      if ($unescapeCheck.checked) {
        try {
          const depth = depthValue;
          const tokens = tokenize(raw);
          const unescaped = unescapeTokens(tokens, depth);
          resultStr = prettyPrint(unescaped);
          // Validate by parsing - if parse fails, show warning
          try {
            JSON.parse(resultStr);
            parseOk = true;
          } catch { parseOk = false; }
        } catch (e) {
          $output.textContent = '❌ 反转义失败：' + e.message;
          $output.className = 'output error';
          $inputLabel.textContent = '✗ 错误';
          $inputLabel.className = 'badge err';
          $outputLabel.textContent = '✗ 失败';
          $outputLabel.className = 'badge err';
          return;
        }
      } else {
        // Pure text formatting (no parse needed)
        try {
          resultStr = formatJSON(raw);
        } catch (e) {
          $output.textContent = '❌ 格式化失败：' + e.message;
          $output.className = 'output error';
          $inputLabel.textContent = '✗ 错误';
          $inputLabel.className = 'badge err';
          $outputLabel.textContent = '✗ 失败';
          $outputLabel.className = 'badge err';
          return;
        }
      }

      $output.innerHTML = highlightSyntax(resultStr);
      $output.className = 'output';
      $inputLabel.textContent = parseOk ? '✓ 有效' : '⚠ 待修正';
      $inputLabel.className = parseOk ? 'badge ok' : 'badge err';
      $outputLabel.textContent = '✓ 完成';
      $outputLabel.className = 'badge ok';
      updateStats(resultStr);
    }

    function copyResult() {
      const text = $output.textContent;
      if (!text || text === '请先输入 JSON' || text === '等待输入…') return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('#tab-format .btn:nth-child(4)');
        const orig = btn.textContent;
        btn.textContent = '✓ 已复制';
        setTimeout(() => btn.textContent = orig, 1500);
      }).catch(() => {});
    }

    function copyInput() {
      navigator.clipboard.writeText($input.value).catch(() => {});
    }

    function clearInput() {
      $input.value = '';
      $inputLabel.textContent = '等待输入';
      $inputLabel.className = 'badge';
      updateStats('');
    }

    function clearOutput() {
      $output.textContent = '等待输入…';
      $output.className = 'output empty';
      $outputLabel.textContent = '就绪';
      $outputLabel.className = 'badge';
      updateStats('');
    }

    function clearAll() {
      $input.value = '';
      $output.textContent = '等待输入…';
      $output.className = 'output empty';
      $inputLabel.textContent = '等待输入';
      $inputLabel.className = 'badge';
      $outputLabel.textContent = '就绪';
      $outputLabel.className = 'badge';
      updateStats('');
    }

    $input.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); format(); }
    });
    $input.addEventListener('input', () => {
      $inputLabel.textContent = '输入中…';
      $inputLabel.className = 'badge';
      updateStats($input.value);
    });

    // ================================================================
    // Escape tab
    // ================================================================
    function escapeJsonString(str) {
      // Escape a string as a JSON string literal (preserves content exactly)
      let result = '"';
      for (let i = 0; i < str.length; i++) {
        const ch = str[i];
        const code = str.charCodeAt(i);
        if (ch === '"') result += '\\"';
        else if (ch === '\\') result += '\\\\';
        else if (ch === '\n') result += '\\n';
        else if (ch === '\r') result += '\\r';
        else if (ch === '\t') result += '\\t';
        else if (code < 32) result += '\\u' + code.toString(16).padStart(4, '0');
        else result += ch;
      }
      return result + '"';
    }

    function doEscape() {
      const raw = $escapeInput.value.trim();
      if (!raw) {
        $escapeOutput.textContent = '请先输入 JSON';
        $escapeOutput.className = 'output error';
        return;
      }

      // Validate: try parsing with JSON.parse for syntax check only
      // Then re-escape using text-level approach to preserve large numbers
      try {
        JSON.parse(raw);
      } catch (e) {
        $escapeOutput.textContent = '❌ JSON 解析失败：' + e.message;
        $escapeOutput.className = 'output error';
        $escapeInputLabel.textContent = '✗ 无效 JSON';
        $escapeInputLabel.className = 'badge err';
        $escapeOutputLabel.textContent = '✗ 失败';
        $escapeOutputLabel.className = 'badge err';
        return;
      }

      // Minify: tokenize and rebuild without whitespace (preserves large numbers)
      const tokens = tokenize(raw);
      const compact = tokens.map(t => t.value).join('');
      // Use text-level escaping to preserve large numbers
      const result = escapeJsonString(compact);

      $escapeOutput.innerHTML = '<span class="escaped-str">' + result.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>';
      $escapeOutput.className = 'output';
      $escapeInputLabel.textContent = '✓ 有效 JSON';
      $escapeInputLabel.className = 'badge ok';
      $escapeOutputLabel.textContent = '✓ 已转义';
      $escapeOutputLabel.className = 'badge ok';
    }

    function copyEscapeResult() {
      const text = $escapeOutput.textContent;
      if (!text || text === '请先输入 JSON' || text === '等待输入…') return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('#tab-escape .btn:nth-child(2)');
        const orig = btn.textContent;
        btn.textContent = '✓ 已复制';
        setTimeout(() => btn.textContent = orig, 1500);
      }).catch(() => {});
    }

    function copyEscapeInput() {
      navigator.clipboard.writeText($escapeInput.value).catch(() => {});
    }

    function clearEscapeInput() {
      $escapeInput.value = '';
      $escapeInputLabel.textContent = '等待输入';
      $escapeInputLabel.className = 'badge';
    }

    function clearEscapeOutput() {
      $escapeOutput.textContent = '等待输入…';
      $escapeOutput.className = 'output empty';
      $escapeOutputLabel.textContent = '就绪';
      $escapeOutputLabel.className = 'badge';
    }

    function clearEscape() {
      $escapeInput.value = '';
      $escapeOutput.textContent = '等待输入…';
      $escapeOutput.className = 'output empty';
      $escapeInputLabel.textContent = '等待输入';
      $escapeInputLabel.className = 'badge';
      $escapeOutputLabel.textContent = '就绪';
      $escapeOutputLabel.className = 'badge';
    }

    $escapeInput.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); doEscape(); }
    });
    $escapeInput.addEventListener('input', () => {
      $escapeInputLabel.textContent = '输入中…';
      $escapeInputLabel.className = 'badge';
    });

    // 让输出框可聚焦，Ctrl+A 只选输出内容
    $output.tabIndex = -1;
    $escapeOutput.tabIndex = -1;

    [$output, $escapeOutput].forEach(el => {
      el.addEventListener('mousedown', () => { el.focus(); });
    });

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'a' || e.keyCode === 65)) {
        const active = document.activeElement;
        if (active === $output || active === $escapeOutput) {
          e.preventDefault();
          const range = document.createRange();
          range.selectNodeContents(active);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }
    });

    // Init stats
    updateStats('');
  </script>
