<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#44b3ab"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Wrench handle -->
  <rect x="30" y="52" width="8" height="35" rx="3" fill="url(#accent)" transform="rotate(-15, 34, 52)"/>
  <!-- Wrench head -->
  <path d="M28 32 Q28 24 34 20 Q40 16 46 20 L42 28 Q38 26 36 30 Z" fill="url(#accent)"/>
  <!-- Screwdriver handle -->
  <rect x="58" y="44" width="8" height="40" rx="3" fill="#888" transform="rotate(15, 62, 44)"/>
  <!-- Screwdriver tip -->
  <rect x="57" y="30" width="10" height="16" rx="1" fill="#ccc" transform="rotate(15, 62, 38)"/>
  <!-- Gear -->
  <circle cx="50" cy="45" r="6" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.4"/>
  <circle cx="50" cy="45" r="2" fill="#4ecdc4" opacity="0.6"/>
</svg>
