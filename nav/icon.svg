<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="wc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3dd5c0"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)" stroke="#222" stroke-width="2"/>
  <g transform="translate(50,50) rotate(-25) translate(-50,-50)">
    <!-- Handle thick bar -->
    <rect x="42" y="44" width="16" height="50" rx="5" fill="url(#wc)"/>
    <rect x="42" y="90" width="16" height="8" rx="4" fill="url(#wc)"/>
    <!-- Left jaw -->
    <path d="M42 44 L42 26 Q42 18 48 18 L50 18 L50 44 Z" fill="url(#wc)"/>
    <!-- Right jaw -->
    <path d="M58 44 L58 26 Q58 18 52 18 L50 18 L50 44 Z" fill="url(#wc)"/>
    <!-- Inner cutout between jaws (creates the U-shape opening) -->
    <path d="M48 30 L52 30 L52 18 L48 18 Z" fill="#0f0f0f"/>
  </g>
</svg>
