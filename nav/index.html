<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <title>Victor's Tool Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ===== Tab 栏 ===== */
    .tab-bar {
      display: flex; align-items: center; overflow-x: auto; overflow-y: hidden;
      background: #0d0d0d; border-bottom: 1px solid #1a1a1a;
      padding: 0; position: sticky; top: 0; z-index: 200;
      scrollbar-width: thin; scrollbar-color: #222 transparent;
      min-height: 40px;
    }
    .tab-bar::-webkit-scrollbar { height: 3px; }
    .tab-bar::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    .tab {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px; font-size: 13px; color: #555;
      cursor: pointer; white-space: nowrap; user-select: none;
      border-right: 1px solid #151515;
      transition: all 0.15s; flex-shrink: 0;
      position: relative;
    }
    .tab:hover { color: #888; background: #111; }
    .tab.active {
      color: #e0e0e0; background: #0a0a0a;
      box-shadow: inset 0 -2px 0 #4ecdc4;
    }
    .tab.dragging { opacity: 0.3; }
    .tab.drag-over { border-color: #ffd93d; box-shadow: inset 0 -2px 0 #ffd93d; }
    .tab .tab-close {
      font-size: 10px; color: #333; padding: 2px; border-radius: 3px;
      transition: color 0.15s; line-height: 1;
    }
    .tab .tab-close:hover { color: #ff6b6b; }
    .tab:not(:first-child) .tab-close { display: inline-block; }
    .tab:first-child .tab-icon { font-size: 16px; }
    .tab .tab-icon { flex-shrink: 0; }

    /* ===== 内容区 ===== */
    .tab-content {
      width: 100%;
    }
    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
    }
    #pane-home {
      padding: 30px 20px 40px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.015) 0%, transparent 60%),
        #0a0a0a;
    }
    #pane-home .container { max-width: 800px; margin: 0 auto; }

    .pane-iframe {
      width: 100%; height: calc(100vh - 40px);
      border: none; display: block; background: #0a0a0a;
    }

    .container { max-width: 800px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 {
      font-size: 26px; font-weight: 700; letter-spacing: 4px;
      color: #e0e0e0; margin-bottom: 2px;
    }
    .header .sub { font-size: 13px; color: #555; letter-spacing: 2px; }

    /* ===== 搜索栏 ===== */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .search-wrap {
      flex: 1; position: relative;
    }
    .search-wrap .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: #444; pointer-events: none;
    }
    .search-wrap input {
      width: 100%; padding: 11px 14px 11px 38px;
      background: #111; border: 1px solid #222; border-radius: 10px;
      color: #ccc; font-size: 14px; outline: none;
      transition: border-color 0.2s; font-family: inherit;
    }
    .search-wrap input:focus { border-color: #4ecdc4; }
    .search-wrap input::placeholder { color: #333; }

    .view-toggle {
      display: flex; gap: 4px;
      background: #111; border: 1px solid #222; border-radius: 8px; padding: 3px;
    }
    .view-btn {
      padding: 7px 12px; border: none; border-radius: 6px;
      background: transparent; color: #555; font-size: 14px; cursor: pointer;
      transition: all 0.15s; font-family: inherit; line-height: 1;
    }
    .view-btn.active { background: #222; color: #4ecdc4; }
    .view-btn:hover:not(.active) { color: #888; }

    /* ===== 设置按钮 ===== */
    .settings-wrap { position: relative; }
    .settings-btn {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border: 1px solid #222; border-radius: 8px; background: #111;
      color: #555; font-size: 16px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .settings-btn:hover { border-color: #4ecdc4; color: #4ecdc4; }

    .settings-dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 6px);
      min-width: 200px;
      background: #151515; border: 1px solid #222; border-radius: 10px;
      padding: 8px; z-index: 300;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .settings-dropdown.open { display: block; }

    .setting-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      font-size: 13px; color: #ccc; transition: background 0.15s;
      user-select: none;
    }
    .setting-item:hover { background: #1a1a1a; }

    .setting-item input[type="checkbox"] { display: none; }
    .toggle-slider {
      position: relative; width: 36px; height: 20px;
      background: #333; border-radius: 10px;
      transition: background 0.2s; flex-shrink: 0;
      margin-left: auto;
    }
    .toggle-slider::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #888; transition: all 0.2s;
    }
    .setting-item input:checked + .toggle-slider { background: #4ecdc444; }
    .setting-item input:checked + .toggle-slider::after { left: 18px; background: #4ecdc4; }

    /* ===== 区块标题 ===== */
    .section { margin-bottom: 48px; }
    #allSection { margin-top: 32px; padding-top: 24px; border-top: 1px solid #1a1a1a; }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #1a1a1a;
    }
    .section-header .label {
      font-size: 13px; font-weight: 600; letter-spacing: 2px; color: #555;
      display: flex; align-items: center; gap: 6px;
    }
    .section-header .count {
      font-size: 11px; color: #333; font-weight: 400; letter-spacing: 0;
    }
    .section-header .line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, #1a1a1a, transparent);
    }
    .section-header .action {
      font-size: 12px; color: #333; cursor: pointer; transition: color 0.2s;
    }
    .section-header .action:hover { color: #4ecdc4; }

    .section-empty {
      text-align: center; padding: 30px 20px;
      border: 1px dashed #1a1a1a; border-radius: 10px;
      color: #333; font-size: 13px; letter-spacing: 1px;
    }
    .section-empty .hint { font-size: 11px; color: #222; margin-top: 4px; letter-spacing: 0; }

    /* ===== 工具卡片 ===== */
    .tool-grid {
      display: none;
      grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .tool-grid.active { display: grid; }

    .tool-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .tool-list.hidden { display: none; }

    .tool-card {
      display: flex; align-items: center;
      padding: 14px 16px; border-radius: 10px;
      border: 1px solid #222;
      background: linear-gradient(135deg, #111 0%, #151515 100%);
      text-decoration: none; color: #ccc;
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .tool-card:hover {
      border-color: #4ecdc4;
      background: linear-gradient(135deg, #1a1a1a 0%, #151515 100%);
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.04);
    }
    .tool-card.dragging { opacity: 0.4; }
    .tool-card.drag-over { border-color: #ffd93d; }

    .tool-icon {
      width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-right: 12px; flex-shrink: 0;
    }
    .tool-icon.dev { background: #2a2820; }
    .tool-icon.fun { background: #1a2a28; }
    .tool-info { flex: 1; min-width: 0; }
    .tool-name { font-size: 15px; font-weight: 600; color: #e8e8e8; }
    .tool-desc { font-size: 12px; color: #555; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tool-tags { display: flex; gap: 4px; margin-top: 3px; }
    .tool-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 3px;
    }
    .tool-tag.dev-tag { background: #2a2820; color: #ffd93d; }
    .tool-tag.fun-tag { background: #1a2a28; color: #4ecdc4; }

    .tool-star {
      font-size: 16px; color: #333; margin-left: 8px; flex-shrink: 0;
      transition: color 0.2s; cursor: pointer; padding: 4px;
    }
    .tool-star.active { color: #ffd93d; }
    .tool-star:hover { color: #ffd93d; }

    .tool-arrow { font-size: 14px; color: #444; margin-left: 6px; transition: color 0.15s; flex-shrink: 0; }
    .tool-card:hover .tool-arrow { color: #4ecdc4; }

    .tool-drag-handle {
      font-size: 14px; color: #333; cursor: grab; padding: 4px; margin-right: 4px;
      flex-shrink: 0; user-select: none;
    }
    .tool-drag-handle:active { cursor: grabbing; }
    .fav-card .tool-drag-handle { display: block; }
    .tool-card:not(.fav-card) .tool-drag-handle { display: none; }

    /* ===== 网格模式下 ===== */
    .tool-grid .tool-card {
      flex-direction: column; align-items: center; text-align: center;
      padding: 20px 16px;
    }
    .tool-grid .tool-card .tool-icon {
      margin-right: 0; margin-bottom: 10px; width: 48px; height: 48px; font-size: 22px;
    }
    .tool-grid .tool-card .tool-info { text-align: center; }
    .tool-grid .tool-card .tool-desc { white-space: normal; }
    .tool-grid .tool-card .tool-arrow { display: none; }
    .tool-grid .tool-card .tool-star {
      position: absolute; top: 8px; right: 8px; margin: 0;
    }
    .tool-grid .tool-card .tool-drag-handle {
      position: absolute; top: 8px; left: 8px; margin: 0;
    }
    .tool-grid .tool-card { position: relative; }
    .tool-grid .fav-card .tool-name { max-width: calc(100% - 30px); }

    /* ===== 分类标签 ===== */
    .cat-tabs {
      display: flex; gap: 4px; margin-bottom: 12px;
      background: #111; border-radius: 10px; border: 1px solid #1a1a1a; padding: 3px;
      flex-wrap: wrap;
    }
    .cat-tab {
      padding: 7px 14px; border: none; border-radius: 7px;
      background: transparent; color: #555; font-size: 13px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
      display: flex; align-items: center; gap: 5px;
    }
    .cat-tab:hover { color: #888; }
    .cat-tab.active {
      background: #1a1a1a; color: #e0e0e0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .cat-tab .tab-count { font-size: 10px; color: #444; margin-left: 2px; }
    .cat-tab.active .tab-count { color: #666; }

    /* ===== 收起/展开 ===== */
    .section-header { cursor: pointer; user-select: none; }
    .section-header .collapse-icon {
      font-size: 12px; color: #444; margin-left: 4px; transition: transform 0.2s;
      display: inline-block;
    }
    .section-header .collapse-icon.collapsed { transform: rotate(-90deg); }
    .section-header:hover .collapse-icon { color: #666; }
    .section-body.collapsed { display: none !important; }

    /* ===== 页脚 ===== */
    .footer {
      text-align: center; margin-top: 24px; padding-top: 16px; margin-bottom: 48px;
      border-top: 1px solid #111;
      font-size: 13px; color: #444; letter-spacing: 1px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .footer a {
      color: #555; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      transition: color 0.2s;
    }
    .footer a:hover { color: #4ecdc4; }
    .footer .sep { color: #222; }

    /* ===== 显示隐藏 ===== */
    .hidden { display: none !important; }

    @media (max-width: 600px) {
      body { padding: 0; }
      #pane-home { padding: 20px 14px; }
      .header h1 { font-size: 22px; }
      .tool-grid { grid-template-columns: 1fr; }
      .search-bar { flex-wrap: wrap; }
      .view-toggle { margin-left: auto; }
    }
  </style>
</head>
<body>
  <!-- ===== Tab 栏 ===== -->
  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-tab="home">
      <span class="tab-icon">🏠</span>
      <span>首页</span>
    </div>
  </div>

  <!-- ===== Tab 内容 ===== -->
  <div class="tab-content">
    <div class="tab-pane active" id="pane-home">
      <div class="container">
    <div class="header">
      <h1>🧰 Victor's Tool Collection</h1>
</div>
      <div class="sub"></div>
    </div>

    <!-- 搜索 -->
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索工具…" autocomplete="off"/>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" data-view="list" title="列表">☰</button>
        <button class="view-btn" data-view="grid" title="方格">▦</button>
      </div>
      <div class="settings-wrap">
        <button class="settings-btn" id="settingsBtn" title="设置">⚙</button>
        <div class="settings-dropdown" id="settingsDropdown">
          <label class="setting-item">
            <span>Tab 方式打开工具</span>
            <input type="checkbox" id="tabModeToggle" checked/>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- 收藏的工具 -->
    <div class="section" id="favSection">
      <div class="section-header" data-section="fav">
        <span class="label">⭐ 收藏的工具</span>
        <span class="collapse-icon">▼</span>
        <span class="count" id="favCount"></span>
        <div class="line"></div>
      </div>
      <div class="section-body" id="favBody">
    </div>

    <!-- 全部工具 -->
    <div class="section" id="allSection">
      <div class="section-header" data-section="all">
        <span class="label">📦 全部工具</span>
        <span class="collapse-icon">▼</span>
        <span class="count" id="allCount"></span>
        <div class="line"></div>
      </div>
      <div class="section-body" id="allBody">
        <div class="cat-tabs" id="catTabs"></div>
        <div id="allList"></div>
      </div>
    </div>
  </div>
</div>
    <div id="pane-tool"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/victor2025/victor-tool-collection" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
    <span class="sep">·</span>
    <span>Victor's Tool Collection</span>
  </div>

  <script>
    // ===== 工具数据 =====
    const TOOLS = [
      { slug: 'base64',        name: 'Base64 编解码',   desc: 'UTF-8 编码/解码 · 双向同步 · 一键复制',       icon: '🔣', url: '/base64/',         category: 'dev', tags: ['工具'] },
      { slug: 'qrcode',        name: '二维码工具',       desc: '生成二维码 · 图片扫码 · 摄像头扫码',             icon: '📱', url: '/qrcode/',         category: 'dev', tags: ['工具'] },
      { slug: 'webshell',      name: 'WebShell 终端',    desc: 'Web SSH · 本地终端 · 快速连接',                 icon: '🖥', url: '/webshell/',       category: 'dev', tags: ['工具'] },
      { slug: 'json-formatter',name: 'JSON 格式化',      desc: '格式化 · 校验 · 语法高亮',                     icon: '{ }',  url: '/json-formatter/', category: 'dev', tags: ['工具'] },
      { slug: 'jwt-decoder',   name: 'JWT 解码',        desc: '解析 Header · Payload · 过期校验',              icon: '🔐', url: '/jwt-decoder/',   category: 'dev', tags: ['工具'] },
      { slug: 'score-board',   name: '记分板',          desc: '可编辑队名 · 翻页动画 · 本地存储',              icon: '🏀', url: '/score-board/',   category: 'fun', tags: ['React'] },
      { slug: 'timestamp',    name: '时间戳转换',       desc: 'Unix 时间戳 · 秒/毫秒 · 双向转换',                icon: '⏰', url: '/timestamp/',     category: 'dev', tags: ['工具'] },
    ];

    // ===== 分类定义 =====
    const CATEGORIES = [
      { id: 'all',  label: '全部',   icon: '📦' },
      { id: 'dev',  label: '开发工具', icon: '🛠' },
      { id: 'fun',  label: '娱乐工具', icon: '🎮' },
    ];

    // ===== localStorage 工具 =====
    function lsGet(key, def) {
      try { const r = localStorage.getItem(key); return r !== null ? JSON.parse(r) : def; } catch { return def; }
    }
    function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
    function lsGetStr(key, def) {
      try { const r = localStorage.getItem(key); return r !== null ? r : def; } catch { return def; }
    }
    function lsSetStr(key, val) { localStorage.setItem(key, val); }

    // ===== 状态 =====
    let favorites = lsGet('vtc_favorites', []);
    let viewMode = lsGetStr('vtc_view', 'list');
    let searchQuery = '';
    let activeCategory = lsGetStr('vtc_category', 'all');
    let tabMode = lsGet('vtc_tabmode', true);
    let collapseState = lsGet('vtc_collapse', {});
    let dragSrcIndex = -1;
    let tabIdCounter = 0;
    const tabs = [];
    let activeTabId = 'home';

    // ===== DOM 缓存 =====
    const dom = {
      favBody: document.getElementById('favBody'),
      allBody: document.getElementById('allBody'),
      favCount: document.getElementById('favCount'),
      allCount: document.getElementById('allCount'),
      searchInput: document.getElementById('searchInput'),
      tabBar: document.getElementById('tabBar'),
      paneHome: document.getElementById('pane-home'),
      paneTool: document.getElementById('pane-tool'),
      catTabs: document.getElementById('catTabs'),
      allList: document.getElementById('allList'),
      settingsBtn: document.getElementById('settingsBtn'),
      settingsDropdown: document.getElementById('settingsDropdown'),
      tabModeToggle: document.getElementById('tabModeToggle'),
    };

    // ===== 状态持久化 =====
    function saveFavorites() { lsSet('vtc_favorites', favorites); }
    function saveView() { lsSetStr('vtc_view', viewMode); }
    function saveCategory() { lsSetStr('vtc_category', activeCategory); }
    function saveCollapse() { lsSet('vtc_collapse', collapseState); }
    function saveTabMode() { lsSet('vtc_tabmode', tabMode); }
    function saveTabs() { lsSet('vtc_tabs', { slugs: tabs.map(t => t.slug), active: activeTabId }); }

    // ===== 工具操作 =====
    function isFavorite(slug) { return favorites.includes(slug); }

    function toggleFavorite(slug) {
      const idx = favorites.indexOf(slug);
      idx >= 0 ? favorites.splice(idx, 1) : favorites.push(slug);
      saveFavorites();
      render();
    }

    function moveFavorite(fromIdx, toIdx) {
      if (fromIdx === toIdx) return;
      const [item] = favorites.splice(fromIdx, 1);
      favorites.splice(toIdx, 0, item);
      saveFavorites();
      render();
    }

    // ===== 过滤 =====
    function getFilteredTools() {
      let list = TOOLS;
      if (activeCategory !== 'all') list = list.filter(t => t.category === activeCategory);
      const q = searchQuery.trim().toLowerCase();
      if (q) {
        list = list.filter(t =>
          t.name.toLowerCase().includes(q) ||
          t.desc.toLowerCase().includes(q) ||
          t.tags.some(tag => tag.toLowerCase().includes(q))
        );
      }
      return list;
    }

    function getFavTools() {
      return favorites.map(slug => TOOLS.find(t => t.slug === slug)).filter(Boolean);
    }

    // ===== 工具卡片渲染 =====
    const TAG_CLASS = { dev: 'dev-tag', fun: 'fun-tag' };
    const CAT_CLASS = { dev: 'dev', fun: 'fun' };

    function renderCard(tool, isFav, index) {
      const tagClass = TAG_CLASS[tool.category] || 'dev-tag';
      const catClass = CAT_CLASS[tool.category] || 'dev';
      const fav = isFavorite(tool.slug);
      return `
        <a href="${tool.url}" class="tool-card ${isFav ? 'fav-card' : ''}" data-slug="${tool.slug}" ${isFav ? `data-fav-index="${index}"` : ''}>
          ${isFav ? `<span class="tool-drag-handle" draggable="true" data-index="${index}">⠿</span>` : ''}
          <div class="tool-icon ${catClass}">${tool.icon}</div>
          <div class="tool-info">
            <div class="tool-name">${tool.name}</div>
            <div class="tool-desc">${tool.desc}</div>
            <div class="tool-tags">${tool.tags.map(t => `<span class="tool-tag ${tagClass}">${t}</span>`).join('')}</div>
          </div>
          <span class="tool-star ${fav ? 'active' : ''}" data-slug="${tool.slug}" title="${fav ? '取消收藏' : '收藏'}">${fav ? '★' : '☆'}</span>
          <span class="tool-arrow">→</span>
        </a>
      `;
    }

    function renderCardList(cardsData, isFav, isGrid) {
      const cards = cardsData.map((t, i) => renderCard(t, isFav, isFav ? i : undefined)).join('');
      return isGrid
        ? `<div class="tool-grid active">${cards}</div>`
        : `<div class="tool-list">${cards}</div>`;
    }

    function renderEmpty(msg, hint) {
      return `\n        <div class="section-empty">\n          ${msg}\n          <div class="hint">${hint}</div>\n        </div>\n      `;
    }

    // ===== 分类 Tab 渲染 =====
    function renderCatTabs() {
      const el = dom.catTabs;
      if (!el) return;
      el.innerHTML = CATEGORIES.map(cat => {
        const count = cat.id === 'all' ? TOOLS.length : TOOLS.filter(t => t.category === cat.id).length;
        return `<button class="cat-tab ${activeCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">${cat.icon} ${cat.label} <span class="tab-count">${count}</span></button>`;
      }).join('');
      el.querySelectorAll('.cat-tab').forEach(tab => {
        tab.addEventListener('click', () => { activeCategory = tab.dataset.cat; saveCategory(); render(); });
      });
    }

    // ===== 区块渲染 =====
    function renderFavorites(favTools, isGrid) {
      if (favTools.length > 0) {
        dom.favBody.innerHTML = renderCardList(favTools, true, isGrid);
        dom.favCount.textContent = `(${favTools.length})`;
        const listEl = dom.favBody.querySelector(isGrid ? '.tool-grid' : '.tool-list');
        if (listEl) listEl.querySelectorAll('.tool-card.fav-card').forEach(el => bindDrag(el));
      } else {
        dom.favBody.innerHTML = renderEmpty('⭐ 还没有收藏的工具', '在下方工具列表点击 ☆ 即可收藏');
        dom.favCount.textContent = '(0)';
      }
    }

    function renderAllTools(filtered, isGrid) {
      const el = dom.allList;
      if (!el) return;
      if (filtered.length > 0) {
        el.innerHTML = renderCardList(filtered, false, isGrid);
      } else {
        el.innerHTML = renderEmpty('🔍 没有匹配的工具', '试试其他关键词');
      }
      dom.allCount.textContent = `(${filtered.length})`;
    }

    // ===== 主渲染 =====
    function render() {
      renderFavorites(getFavTools(), viewMode === 'grid');
      renderAllTools(getFilteredTools(), viewMode === 'grid');
      renderCatTabs();
    }

    // ===== 拖拽 =====
    function bindDrag(el) {
      const handle = el.querySelector('.tool-drag-handle');
      if (!handle) return;
      handle.addEventListener('dragstart', (e) => {
        dragSrcIndex = parseInt(handle.dataset.index);
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '');
      });
      handle.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        document.querySelectorAll('.tool-card.drag-over').forEach(c => c.classList.remove('drag-over'));
      });
      el.addEventListener('dragover', (e) => e.preventDefault());
      el.addEventListener('dragenter', (e) => {
        e.preventDefault();
        if (el.dataset.favIndex !== undefined && parseInt(el.dataset.favIndex) !== dragSrcIndex) el.classList.add('drag-over');
      });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        el.classList.remove('drag-over');
        const targetIdx = parseInt(el.dataset.favIndex);
        if (targetIdx >= 0 && targetIdx !== dragSrcIndex) moveFavorite(dragSrcIndex, targetIdx);
        dragSrcIndex = -1;
      });
    }

    // ===== Tab 管理：多 iframe 显隐切换 =====
    function switchTab(tabId) {
      activeTabId = tabId;
      dom.tabBar.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      const tabEl = dom.tabBar.querySelector(`.tab[data-tab="${tabId}"]`);
      if (tabEl) tabEl.classList.add('active');
      // 所有 pane 隐藏
      dom.paneHome.classList.remove('active');
      dom.paneTool.querySelectorAll('.tool-pane').forEach(p => p.classList.remove('active'));
      if (tabId === 'home') {
        dom.paneHome.classList.add('active');
      } else {
        const pane = dom.paneTool.querySelector(`#tool-pane-${tabId}`);
        if (pane) pane.classList.add('active');
      }
    }

    function closeTab(tabId, e) {
      e.stopPropagation();
      const idx = tabs.findIndex(t => t.id === tabId);
      if (idx < 0) return;
      tabs.splice(idx, 1);
      // 移除 Tab 按钮
      const tabEl = dom.tabBar.querySelector(`.tab[data-tab="${tabId}"]`);
      if (tabEl) tabEl.remove();
      // 移除对应的 iframe pane
      const pane = dom.paneTool.querySelector(`#tool-pane-${tabId}`);
      if (pane) pane.remove();
      // 切到下一个可用 Tab
      const activeEl = dom.tabBar.querySelector('.tab.active');
      if (!activeEl || activeEl.dataset.tab === tabId) {
        const remaining = dom.tabBar.querySelectorAll('.tab');
        switchTab(remaining.length > 0 ? remaining[remaining.length - 1].dataset.tab : 'home');
      }
      saveTabs();
    }

    function openToolTab(tool) {
      const existing = tabs.find(t => t.slug === tool.slug);
      if (existing) { switchTab(existing.id); return; }
      const tabId = 'tab-' + (++tabIdCounter);
      tabs.push({ id: tabId, slug: tool.slug, name: tool.name, icon: tool.icon, url: tool.url });
      // 创建 Tab 按钮
      const tabEl = document.createElement('div');
      tabEl.className = 'tab';
      tabEl.dataset.tab = tabId;
      tabEl.draggable = false;
      tabEl.innerHTML = `<span class="tab-icon">${tool.icon}</span><span>${tool.name}</span><span class="tab-close">✕</span>`;
      tabEl.addEventListener('click', () => switchTab(tabId));
      tabEl.querySelector('.tab-close').addEventListener('click', (e) => closeTab(tabId, e));
      dom.tabBar.appendChild(tabEl);
      makeTabDraggable(tabEl, tabId);
      tabEl.scrollIntoView({ behavior: 'smooth', inline: 'end', block: 'nearest' });
      // 创建独立的 iframe 容器（只加载一次，切换不销毁）
      const pane = document.createElement('div');
      pane.className = 'tab-pane tool-pane';
      pane.id = 'tool-pane-' + tabId;
      const iframe = document.createElement('iframe');
      iframe.className = 'pane-iframe';
      iframe.src = tool.url;
      iframe.addEventListener('load', () => hideIframeBackLinks(iframe));
      pane.appendChild(iframe);
      dom.paneTool.appendChild(pane);
      switchTab(tabId);
      saveTabs();
    }

    function hideIframeBackLinks(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.querySelectorAll('.back-link').forEach(el => el.style.display = 'none');
      } catch(e) {}
    }

    function closeAllToolTabs() {
      dom.tabBar.querySelectorAll('.tab:not([data-tab="home"])').forEach(el => el.remove());
      tabs.length = 0;
      dom.paneTool.innerHTML = '';
      dom.paneHome.classList.add('active');
      dom.tabBar.querySelector('.tab[data-tab="home"]')?.classList.add('active');
      activeTabId = 'home';
    }

    // ===== Tab 拖拽排序 =====
    let dragTabId = null;

    function makeTabDraggable(tabEl, tabId) {
      if (tabId === 'home') return;
      tabEl.draggable = true;

      tabEl.addEventListener('dragstart', (e) => {
        dragTabId = tabId;
        tabEl.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', tabId);
      });

      tabEl.addEventListener('dragend', () => {
        tabEl.classList.remove('dragging');
        document.querySelectorAll('.tab.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragTabId = null;
      });

      tabEl.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      tabEl.addEventListener('dragenter', (e) => {
        e.preventDefault();
        if (tabEl.dataset.tab !== dragTabId && tabEl.dataset.tab !== 'home') {
          tabEl.classList.add('drag-over');
        }
      });

      tabEl.addEventListener('dragleave', () => {
        tabEl.classList.remove('drag-over');
      });

      tabEl.addEventListener('drop', (e) => {
        e.preventDefault();
        tabEl.classList.remove('drag-over');
        if (!dragTabId || dragTabId === tabEl.dataset.tab || tabEl.dataset.tab === 'home') return;

        const fromIdx = tabs.findIndex(t => t.id === dragTabId);
        const toEl = tabEl;
        const toIdx = tabs.findIndex(t => t.id === toEl.dataset.tab);
        if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;

        // 移动 tab 数据
        const [moved] = tabs.splice(fromIdx, 1);
        tabs.splice(toIdx, 0, moved);

        // 移动 DOM 元素
        const fromEl = dom.tabBar.querySelector(`.tab[data-tab="${dragTabId}"]`);
        if (fromEl && toEl) {
          if (toIdx > fromIdx) {
            toEl.after(fromEl);
          } else {
            toEl.before(fromEl);
          }
        }
        saveTabs();
      });
    }

    function restoreTabs() {
      const saved = lsGet('vtc_tabs', null);
      if (!saved || !saved.slugs || !Array.isArray(saved.slugs)) return;
      saved.slugs.forEach(slug => {
        const tool = TOOLS.find(t => t.slug === slug);
        if (tool) openToolTab(tool);
      });
      switchTab('home');
    }

    // ===== 区块折叠 =====
    function getSectionBody(section) { return section === 'fav' ? dom.favBody : dom.allBody; }

    function applyCollapse(section, collapsed) {
      getSectionBody(section).classList.toggle('collapsed', collapsed);
      const icon = document.querySelector(`.section-header[data-section="${section}"] .collapse-icon`);
      if (icon) icon.classList.toggle('collapsed', collapsed);
    }

    // ===== 事件绑定 =====
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        viewMode = btn.dataset.view;
        saveView();
        render();
      });
    });

    document.querySelectorAll('.section-header').forEach(header => {
      header.addEventListener('click', () => {
        const section = header.dataset.section;
        const body = getSectionBody(section);
        const collapsed = body.classList.toggle('collapsed');
        const icon = header.querySelector('.collapse-icon');
        if (icon) icon.classList.toggle('collapsed', collapsed);
        collapseState[section] = collapsed;
        saveCollapse();
      });
    });

    dom.searchInput.addEventListener('input', () => {
      searchQuery = dom.searchInput.value;
      render();
    });

    dom.tabBar.querySelector('.tab[data-tab="home"]').addEventListener('click', () => switchTab('home'));

    document.addEventListener('click', (e) => {
      const star = e.target.closest('.tool-star');
      if (star) { e.preventDefault(); e.stopPropagation(); toggleFavorite(star.dataset.slug); return; }
      const card = e.target.closest('.tool-card');
      if (!card || e.target.closest('.tool-drag-handle')) return;
      if (!tabMode) return;
      e.preventDefault();
      const slug = card.dataset.slug;
      if (!slug) return;
      const tool = TOOLS.find(t => t.slug === slug);
      if (tool) openToolTab(tool);
    });

    dom.settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dom.settingsDropdown.classList.toggle('open');
    });
    document.addEventListener('click', () => dom.settingsDropdown.classList.remove('open'));
    dom.tabModeToggle.addEventListener('change', () => {
      tabMode = dom.tabModeToggle.checked;
      saveTabMode();
      if (!tabMode) { closeAllToolTabs(); saveTabs(); }
    });

    // ===== 初始化 =====
    dom.tabModeToggle.checked = tabMode;
    Object.keys(collapseState).forEach(s => { if (collapseState[s]) applyCollapse(s, true); });
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === viewMode));
    restoreTabs();
    render();
  </script>
</body>
</html>
