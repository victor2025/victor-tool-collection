<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Victor Tool Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 30px 20px 40px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.015) 0%, transparent 60%),
        #0a0a0a;
    }
    .container { max-width: 800px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 {
      font-size: 26px; font-weight: 700; letter-spacing: 4px;
      color: #e0e0e0; margin-bottom: 2px;
    }
    .header .sub { font-size: 13px; color: #555; letter-spacing: 2px; }

    /* ===== 搜索栏 ===== */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .search-wrap {
      flex: 1; position: relative;
    }
    .search-wrap .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: #444; pointer-events: none;
    }
    .search-wrap input {
      width: 100%; padding: 11px 14px 11px 38px;
      background: #111; border: 1px solid #222; border-radius: 10px;
      color: #ccc; font-size: 14px; outline: none;
      transition: border-color 0.2s; font-family: inherit;
    }
    .search-wrap input:focus { border-color: #4ecdc4; }
    .search-wrap input::placeholder { color: #333; }

    .view-toggle {
      display: flex; gap: 4px;
      background: #111; border: 1px solid #222; border-radius: 8px; padding: 3px;
    }
    .view-btn {
      padding: 7px 12px; border: none; border-radius: 6px;
      background: transparent; color: #555; font-size: 14px; cursor: pointer;
      transition: all 0.15s; font-family: inherit; line-height: 1;
    }
    .view-btn.active { background: #222; color: #4ecdc4; }
    .view-btn:hover:not(.active) { color: #888; }

    /* ===== 区块标题 ===== */
    .section { margin-bottom: 28px; }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #1a1a1a;
    }
    .section-header .label {
      font-size: 13px; font-weight: 600; letter-spacing: 2px; color: #555;
      display: flex; align-items: center; gap: 6px;
    }
    .section-header .count {
      font-size: 11px; color: #333; font-weight: 400; letter-spacing: 0;
    }
    .section-header .line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, #1a1a1a, transparent);
    }
    .section-header .action {
      font-size: 12px; color: #333; cursor: pointer; transition: color 0.2s;
    }
    .section-header .action:hover { color: #4ecdc4; }

    .section-empty {
      text-align: center; padding: 30px 20px;
      border: 1px dashed #1a1a1a; border-radius: 10px;
      color: #333; font-size: 13px; letter-spacing: 1px;
    }
    .section-empty .hint { font-size: 11px; color: #222; margin-top: 4px; letter-spacing: 0; }

    /* ===== 工具卡片 ===== */
    .tool-grid {
      display: none;
      grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .tool-grid.active { display: grid; }

    .tool-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .tool-list.hidden { display: none; }

    .tool-card {
      display: flex; align-items: center;
      padding: 14px 16px; border-radius: 10px;
      border: 1px solid #222;
      background: linear-gradient(135deg, #111 0%, #151515 100%);
      text-decoration: none; color: #ccc;
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .tool-card:hover {
      border-color: #4ecdc4;
      background: linear-gradient(135deg, #1a1a1a 0%, #151515 100%);
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.04);
    }
    .tool-card.dragging { opacity: 0.4; }
    .tool-card.drag-over { border-color: #ffd93d; }

    .tool-icon {
      width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-right: 12px; flex-shrink: 0;
    }
    .tool-icon.dev { background: #2a2820; }
    .tool-icon.fun { background: #1a2a28; }
    .tool-info { flex: 1; min-width: 0; }
    .tool-name { font-size: 15px; font-weight: 600; color: #e8e8e8; }
    .tool-desc { font-size: 12px; color: #555; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tool-tags { display: flex; gap: 4px; margin-top: 3px; }
    .tool-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 3px;
    }
    .tool-tag.dev-tag { background: #2a2820; color: #ffd93d; }
    .tool-tag.fun-tag { background: #1a2a28; color: #4ecdc4; }

    .tool-star {
      font-size: 16px; color: #333; margin-left: 8px; flex-shrink: 0;
      transition: color 0.2s; cursor: pointer; padding: 4px;
    }
    .tool-star.active { color: #ffd93d; }
    .tool-star:hover { color: #ffd93d; }

    .tool-arrow { font-size: 14px; color: #444; margin-left: 6px; transition: color 0.15s; flex-shrink: 0; }
    .tool-card:hover .tool-arrow { color: #4ecdc4; }

    .tool-drag-handle {
      font-size: 14px; color: #333; cursor: grab; padding: 4px; margin-right: 4px;
      flex-shrink: 0; user-select: none;
    }
    .tool-drag-handle:active { cursor: grabbing; }
    .fav-card .tool-drag-handle { display: block; }
    .tool-card:not(.fav-card) .tool-drag-handle { display: none; }

    /* ===== 网格模式下 ===== */
    .tool-grid .tool-card {
      flex-direction: column; align-items: center; text-align: center;
      padding: 20px 16px;
    }
    .tool-grid .tool-card .tool-icon {
      margin-right: 0; margin-bottom: 10px; width: 48px; height: 48px; font-size: 22px;
    }
    .tool-grid .tool-card .tool-info { text-align: center; }
    .tool-grid .tool-card .tool-desc { white-space: normal; }
    .tool-grid .tool-card .tool-arrow { display: none; }
    .tool-grid .tool-card .tool-star {
      position: absolute; top: 8px; right: 8px; margin: 0;
    }
    .tool-grid .tool-card .tool-drag-handle {
      position: absolute; top: 8px; left: 8px; margin: 0;
    }
    .tool-grid .tool-card { position: relative; }
    .tool-grid .fav-card .tool-name { max-width: calc(100% - 30px); }

    /* ===== 显示隐藏 ===== */
    .hidden { display: none !important; }

    @media (max-width: 600px) {
      body { padding: 20px 14px; }
      .header h1 { font-size: 22px; }
      .tool-grid { grid-template-columns: 1fr; }
      .search-bar { flex-wrap: wrap; }
      .view-toggle { margin-left: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧰 Victor Tool Collection</h1>
      <div class="sub">localhost:8001</div>
    </div>

    <!-- 搜索 -->
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索工具…" autocomplete="off"/>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" data-view="list" title="列表">☰</button>
        <button class="view-btn" data-view="grid" title="方格">▦</button>
      </div>
    </div>

    <!-- 收藏的工具 -->
    <div class="section" id="favSection">
      <div class="section-header">
        <span class="label">⭐ 收藏的工具</span>
        <span class="count" id="favCount"></span>
        <div class="line"></div>
      </div>
      <div id="favContainer"></div>
    </div>

    <!-- 全部工具 -->
    <div class="section" id="allSection">
      <div class="section-header">
        <span class="label">📦 全部工具</span>
        <span class="count" id="allCount"></span>
        <div class="line"></div>
      </div>
      <div id="allContainer"></div>
    </div>
  </div>

  <script>
    // ===== 工具数据 =====
    const TOOLS = [
      { slug: 'base64',        name: 'Base64 编解码',   desc: 'UTF-8 编码/解码 · 双向同步 · 一键复制',       icon: '🔣', url: '/base64/',         category: 'dev', tags: ['工具'] },
      { slug: 'qrcode',        name: '二维码工具',       desc: '生成二维码 · 图片扫码 · 摄像头扫码',             icon: '📱', url: '/qrcode/',         category: 'dev', tags: ['工具'] },
      { slug: 'webshell',      name: 'WebShell 终端',    desc: 'Web SSH · 本地终端 · 快速连接',                 icon: '🖥', url: '/webshell/',       category: 'dev', tags: ['工具'] },
      { slug: 'json-formatter',name: 'JSON 格式化',      desc: '格式化 · 校验 · 语法高亮',                     icon: '{ }',  url: '/json-formatter/', category: 'dev', tags: ['工具'] },
      { slug: 'jwt-decoder',   name: 'JWT 解码',        desc: '解析 Header · Payload · 过期校验',              icon: '🔐', url: '/jwt-decoder/',   category: 'dev', tags: ['工具'] },
      { slug: 'score-board',   name: '记分板',          desc: '可编辑队名 · 翻页动画 · 本地存储',              icon: '🏀', url: '/score-board/',   category: 'fun', tags: ['React'] },
    ];

    const LS_FAV = 'vtc_favorites';
    const LS_VIEW = 'vtc_view';

    // ===== 状态 =====
    let favorites = [];
    let viewMode = 'list';
    let searchQuery = '';
    let dragSrcIndex = -1;

    // ===== DOM =====
    const $favContainer = document.getElementById('favContainer');
    const $allContainer = document.getElementById('allContainer');
    const $favCount = document.getElementById('favCount');
    const $allCount = document.getElementById('allCount');
    const $searchInput = document.getElementById('searchInput');

    // ===== localStorage =====
    function loadFavorites() {
      try { const r = localStorage.getItem(LS_FAV); favorites = r ? JSON.parse(r) : []; } catch { favorites = []; }
    }
    function saveFavorites() {
      localStorage.setItem(LS_FAV, JSON.stringify(favorites));
    }

    function loadView() {
      try { const r = localStorage.getItem(LS_VIEW); if (r === 'grid' || r === 'list') viewMode = r; } catch {}
    }
    function saveView() {
      localStorage.setItem(LS_VIEW, viewMode);
    }

    // ===== 工具操作 =====
    function isFavorite(slug) {
      return favorites.includes(slug);
    }

    function toggleFavorite(slug) {
      const idx = favorites.indexOf(slug);
      if (idx >= 0) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(slug);
      }
      saveFavorites();
      render();
    }

    function moveFavorite(fromIdx, toIdx) {
      if (fromIdx === toIdx) return;
      const [item] = favorites.splice(fromIdx, 1);
      favorites.splice(toIdx, 0, item);
      saveFavorites();
      render();
    }

    // ===== 过滤 =====
    function getFilteredTools() {
      if (!searchQuery.trim()) return TOOLS;
      const q = searchQuery.trim().toLowerCase();
      return TOOLS.filter(t =>
        t.name.toLowerCase().includes(q) ||
        t.desc.toLowerCase().includes(q) ||
        t.tags.some(tag => tag.toLowerCase().includes(q))
      );
    }

    function getFavTools() {
      return favorites.map(slug => TOOLS.find(t => t.slug === slug)).filter(Boolean);
    }

    // ===== 渲染 =====
    function renderCard(tool, isFav, index) {
      const fav = isFavorite(tool.slug);
      const tagClass = tool.category === 'fun' ? 'fun-tag' : 'dev-tag';
      const catClass = tool.category === 'fun' ? 'fun' : 'dev';

      const dragHandle = isFav
        ? `<span class="tool-drag-handle" draggable="true" data-index="${index}">⠿</span>`
        : '';

      const starBtn = `<span class="tool-star ${fav ? 'active' : ''}" data-slug="${tool.slug}" title="${fav ? '取消收藏' : '收藏'}">${fav ? '★' : '☆'}</span>`;

      const tagsHTML = tool.tags.map(t => `<span class="tool-tag ${tagClass}">${t}</span>`).join('');

      return `
        <a href="${tool.url}" class="tool-card ${isFav ? 'fav-card' : ''}" data-slug="${tool.slug}" ${isFav ? `data-fav-index="${index}"` : ''}>
          ${dragHandle}
          <div class="tool-icon ${catClass}">${tool.icon}</div>
          <div class="tool-info">
            <div class="tool-name">${tool.name}</div>
            <div class="tool-desc">${tool.desc}</div>
            <div class="tool-tags">${tagsHTML}</div>
          </div>
          ${starBtn}
          <span class="tool-arrow">→</span>
        </a>
      `;
    }

    function render() {
      const filtered = getFilteredTools();
      const favTools = getFavTools();
      const isGrid = viewMode === 'grid';

      // 收藏的
      if (favTools.length > 0) {
        const cards = favTools.map((t, i) => renderCard(t, true, i)).join('');
        $favContainer.innerHTML = isGrid
          ? `<div class="tool-grid active">${cards}</div>`
          : `<div class="tool-list">${cards}</div>`;
        $favCount.textContent = `(${favTools.length})`;

        // 绑定收藏拖动
        if (isGrid) {
          $favContainer.querySelector('.tool-grid').querySelectorAll('.tool-card').forEach(el => {
            bindDrag(el);
          });
        } else {
          $favContainer.querySelector('.tool-list').querySelectorAll('.tool-card').forEach(el => {
            bindDrag(el);
          });
        }
      } else {
        $favContainer.innerHTML = `
          <div class="section-empty">
            ⭐ 还没有收藏的工具
            <div class="hint">在下方工具列表点击 ☆ 即可收藏</div>
          </div>
        `;
        $favCount.textContent = '(0)';
      }

      // 全部工具
      if (filtered.length > 0) {
        const cards = filtered.map(t => renderCard(t, false)).join('');
        $allContainer.innerHTML = isGrid
          ? `<div class="tool-grid active">${cards}</div>`
          : `<div class="tool-list">${cards}</div>`;
        $allCount.textContent = `(${filtered.length})`;
      } else {
        $allContainer.innerHTML = `
          <div class="section-empty">
            🔍 没有匹配的工具
            <div class="hint">试试其他关键词</div>
          </div>
        `;
        $allCount.textContent = '(0)';
      }

      // 绑定收藏点击
      document.querySelectorAll('.tool-star').forEach(el => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          toggleFavorite(el.dataset.slug);
        });
      });
    }

    // ===== 拖拽 =====
    function bindDrag(el) {
      const handle = el.querySelector('.tool-drag-handle');
      if (!handle) return;

      handle.addEventListener('dragstart', (e) => {
        const idx = parseInt(handle.dataset.index);
        dragSrcIndex = idx;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', idx);
      });

      handle.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        document.querySelectorAll('.tool-card.drag-over').forEach(c => c.classList.remove('drag-over'));
      });

      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      el.addEventListener('dragenter', (e) => {
        e.preventDefault();
        if (el.dataset.favIndex !== undefined && parseInt(el.dataset.favIndex) !== dragSrcIndex) {
          el.classList.add('drag-over');
        }
      });

      el.addEventListener('dragleave', () => {
        el.classList.remove('drag-over');
      });

      el.addEventListener('drop', (e) => {
        e.preventDefault();
        el.classList.remove('drag-over');
        const targetIdx = parseInt(el.dataset.favIndex);
        if (targetIdx >= 0 && targetIdx !== dragSrcIndex) {
          moveFavorite(dragSrcIndex, targetIdx);
        }
        dragSrcIndex = -1;
      });
    }

    // ===== 视图切换 =====
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        viewMode = btn.dataset.view;
        saveView();
        render();
      });
    });

    // ===== 搜索 =====
    $searchInput.addEventListener('input', () => {
      searchQuery = $searchInput.value;
      render();
    });

    // ===== 初始化 =====
    loadFavorites();
    loadView();
    // 激活保存的视图
    document.querySelectorAll('.view-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.view === viewMode);
    });
    render();
  </script>
</body>
</html>
