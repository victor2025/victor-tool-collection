server {
	listen 8001;
	listen [::]:8001;

	server_name _;
	charset utf-8;

	# ===== 导航页 =====
	root /home/pi/projects/Frontend/victor-tool-collection/nav;
	index index.html;

	location / {
		try_files $uri $uri/ =404;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：记分板 =====
	location /score-board {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/score-board/dist;
		try_files $uri $uri/ /score-board/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	location /score-board/assets/ {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/score-board/dist/assets/;
		expires 1y;
		add_header Cache-Control "public, immutable";
	}

	location /score-board/fonts/ {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/score-board/dist/fonts/;
		expires 1y;
		add_header Cache-Control "public, immutable";
	}

	# ===== 工具：Base64 编解码 =====
	location /base64 {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/base64/dist;
		try_files $uri $uri/ /base64/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：二维码工具 =====
	location /qrcode {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/qrcode/dist;
		try_files $uri $uri/ /qrcode/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：JSON 格式化 =====
	location /json-formatter {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/json-formatter/dist;
		try_files $uri $uri/ /json-formatter/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：JWT 解码 =====
	location /jwt-decoder {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/jwt-decoder/dist;
		try_files $uri $uri/ /jwt-decoder/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：台风观测 =====
	location /typhoon {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/typhoon/dist;
		try_files $uri $uri/ /typhoon/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：管理后台 =====
	location /admin {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/admin/dist;
		try_files $uri $uri/ /admin/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：时间戳转换 =====
	location /timestamp {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/timestamp/dist;
		try_files $uri $uri/ /timestamp/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# ===== 工具：WebShell =====
	location /webshell {
		alias /home/pi/projects/Frontend/victor-tool-collection/tools/webshell/dist;
		try_files $uri $uri/ /webshell/index.html;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	location /webshell/term/ {

		proxy_pass http://127.0.0.1:8022/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 86400s;
		proxy_send_timeout 86400s;
	}

	# ===== 访问日志代理 =====
	location /_log/ {
		proxy_pass http://127.0.0.1:8002/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		add_header Cache-Control "no-cache, must-revalidate";
		add_header Access-Control-Allow-Origin *;
	}
}
